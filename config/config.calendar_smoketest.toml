# Calendar smoke-test — bigsign (256×64 canvas)
#
# Hardware validation for the `calendar` widget (PR #208) on bigsign / longboi.
# Walk the sections on hardware and confirm each behaves as the comment says.
#
# >>> BEFORE RUNNING: replace every  ics_url = "PASTE_YOUR_..._ICS_URL_HERE"  <<<
# with a real iCal feed URL. Get one from:
#   - Google Calendar → Settings → <your calendar> → "Secret address in iCal
#     format" (an https://calendar.google.com/calendar/ical/.../basic.ics link)
#   - iCloud → share a calendar → Public Calendar → copy link (rewrite the
#     leading webcal:// to https:// OR leave webcal:// — the widget rewrites it)
#   - Outlook/Office365 → Calendar settings → "Publish a calendar" → ICS link
# The secret URL IS the credential — your config.toml is gitignored, so paste it
# directly here; do NOT commit it to a public repo.
#
# Usage: cp config/config.calendar_smoketest.toml config/config.toml
#
# loop_count GOTCHA: each section uses loop_count = 1 so it makes ONE pass then
# the playlist advances; the top-level playlist loops forever, so all sections
# cycle. Do NOT use loop_count = 0 (cycles a single section forever).

[display]
rows = 32
cols = 64
chain_length = 8
parallel = 1
# Vertical-serpentine 2×4 panel map. See https://docs.ledticker.dev/hardware/bigsign/
pixel_mapper_config = "Remap:256,64|192,32n|192,0n|128,32n|128,0n|64,32n|64,0n|0,32n|0,0n"
brightness = 60
default_scale = 4
hardware_mapping = "adafruit-hat"
gpio_slowdown = 3
pwm_bits = 8
show_refresh_rate = true

[title]
delay = 5

[transitions]
default = "cut"
duration = 0.5
easing = "ease_out"
between_sections = "cut"

# --- agenda layout (the default): rotating upcoming events, hires font ---
# Two-tone: the time phrase ("Tomorrow 3:09 PM ·") renders in time_color (cyan
# here) and the title in font_color (rainbow). Confirm the soonest several events
# appear in chronological order, the time phrase is clearly CYAN while the title
# sweeps rainbow, and a "1:1" event (if any) overrides BOTH and shows all-amber.

[[playlist.section]]
mode = "swap"
content_height = 16
hold_time = 8
loop_count = 1

[[playlist.section.widget]]
type = "calendar.events"
ics_url = "PASTE_YOUR_GOOGLE_OR_ICLOUD_ICS_URL_HERE"
layout = "agenda"
timezone = "America/New_York"   # set to your IANA zone (or omit for system-local)
time_format = "12h"             # "12h" -> "3:09 PM", "24h" -> "15:09"
max_events = 5
lookahead_days = 7
highlight = ["1:1", "interview"]  # matching events render all-amber (highlight_color)
font = "Inter-Regular"
font_size = 32
font_threshold = 80
time_color = [0, 200, 255]      # cyan time phrase (default is amber [255,200,60])
font_color = "rainbow"          # title sweeps rainbow — two-tone with the cyan time
update_interval = 300           # refetch every 5 min (default 900) for quicker testing

# --- next layout: one live countdown to the soonest event (THE liveness check) ---
# Shows "<summary> · in 25m" and ticks down live (recomputed every ~50ms),
# rolling to the next event as each one starts. An all-day event today shows
# "· today". The title is white; the "· in 25m" time phrase sweeps rainbow, which
# also exercises the per-effect frame counter wiring for an animated time_color.
# Hold this section long enough (20s) to watch the minutes/seconds advance AND the
# rainbow sweep move across the countdown.

[[playlist.section]]
mode = "swap"
content_height = 16
hold_time = 20
loop_count = 1

[[playlist.section.widget]]
type = "calendar.events"
ics_url = "PASTE_YOUR_GOOGLE_OR_ICLOUD_ICS_URL_HERE"
layout = "next"
timezone = "America/New_York"
font = "Inter-Regular"
font_size = 32
font_threshold = 80
font_color = [255, 255, 255]    # white title
time_color = "rainbow"          # animated countdown phrase (tests animated time_color)
empty_text = "No upcoming events"
update_interval = 300

# --- filtered agenda: keep ONLY events whose summary matches a keyword ---
# Confirm ONLY matching events show (everything else is filtered out). Swap the
# keywords to ones that exist on your calendar.

[[playlist.section]]
mode = "swap"
content_height = 16
hold_time = 8
loop_count = 1

[[playlist.section.widget]]
type = "calendar.events"
ics_url = "PASTE_YOUR_GOOGLE_OR_ICLOUD_ICS_URL_HERE"
layout = "agenda"
timezone = "America/New_York"
time_format = "24h"
filter = ["standup", "1:1", "sprint"]   # ONLY these show
max_events = 5
font = "Inter-Regular"
font_size = 32
font_threshold = 80
time_color = [150, 150, 150]    # grey time phrase (baseball date-label style)
font_color = "color_cycle"      # title cycles colors over the grey time

# --- second timezone (sanity): same feed, different display zone ---
# Should render the same events shifted to the other zone's wall-clock. This
# section also flexes the SINGLE-COLOR path: set time_color == font_color so the
# whole line (time phrase + title) is one uniform rainbow, no two-tone split.

[[playlist.section]]
mode = "swap"
content_height = 16
hold_time = 8
loop_count = 1

[[playlist.section.widget]]
type = "calendar.events"
ics_url = "PASTE_YOUR_GOOGLE_OR_ICLOUD_ICS_URL_HERE"
layout = "agenda"
timezone = "Asia/Tokyo"
time_format = "12h"
font = "Inter-Regular"
font_size = 32
font_threshold = 80
time_color = "rainbow"          # same as font_color -> uniform single-color line
font_color = "rainbow"

# --- two_row layout: per-event card (held day+time on top, scrolling title) ---
# Each event becomes a two-row card. Confirm the day+time holds on the top row
# (amber) while a long title scrolls on the bottom row (white).
#
# IMPORTANT scale note: two rows split the canvas, so this section runs at
# scale = 2 (logical canvas 128px wide, 24px tall) instead of the bigsign
# default scale = 4 (only 64px wide). At scale = 4 the HELD day+time row clips
# long phrases like "Tomorrow 12:00 PM" — `led-ticker validate` warns about it.
# scale = 2 gives the held row room and taller per-row bands for the hires font.

[[playlist.section]]
mode = "swap"
scale = 2
content_height = 24             # 24 x scale 2 = 48 <= 64 panel; bands are 12/12
hold_time = 10
loop_count = 1

[[playlist.section.widget]]
type = "calendar.events"
ics_url = "PASTE_YOUR_GOOGLE_OR_ICLOUD_ICS_URL_HERE"
layout = "two_row"
timezone = "America/New_York"
time_format = "12h"
max_events = 5
font = "Inter-Regular"
font_size = 16                  # hires logical line-height 10 <= 12-row band
font_threshold = 80
time_color = [255, 200, 60]     # held day+time row (amber)
font_color = [255, 255, 255]    # scrolling title row (white)
highlight = ["1:1", "interview"]  # a matching event renders the whole card amber
update_interval = 300
